<!DOCTYPE html>
<html lang="ja">

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ポケマネ">
  <meta name="theme-color" content="#e53935">

<title>ポケモンバトルマネージャー</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #CC2200; --surface: #ffffff; --surface2: #f5f5f5;
  --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.2);
  --text: #1a1a1a; --text2: #666;
  --radius: 8px; --radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root { --surface: #1e1e1e; --surface2: #2a2a2a; --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2); --text: #f0f0f0; --text2: #aaa; }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; min-height: 100vh; background: var(--surface2); }
#app { max-width: 430px; margin: 0 auto; background: var(--surface2); min-height: 100vh; }
.header { background:var(--red); padding:1rem 1.25rem 0; position:relative; overflow:hidden; }
.header::before { content:''; position:absolute; top:-30px; right:-30px; width:100px; height:100px; border:3px solid rgba(255,255,255,0.15); border-radius:50%; }
.header::after { content:''; position:absolute; top:10px; right:10px; width:44px; height:44px; background:rgba(255,255,255,0.1); border-radius:50%; }
.header-label { color:rgba(255,255,255,0.7); font-size:11px; font-weight:500; letter-spacing:0.1em; }
.header-title { color:white; font-size:18px; font-weight:500; margin-top:2px; }
.tabs { display:flex; margin-top:0.75rem; }
.tab { flex:1; padding:8px 4px; background:transparent; border:none; border-bottom:2px solid transparent; color:rgba(255,255,255,0.55); font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s; }
.tab.on { color:white; border-bottom-color:white; }
.view { display:none; padding:1rem; }
.view.on { display:block; }
.section-label { font-size:11px; font-weight:500; color:var(--text2); letter-spacing:0.07em; text-transform:uppercase; margin-bottom:0.5rem; }
.battle-meta { display:flex; align-items:center; margin-bottom:0.75rem; gap:8px; }
.battle-num { font-size:22px; font-weight:500; color:var(--text); }
.battle-date { font-size:13px; color:var(--text2); }
.btn-new { margin-left:auto; padding:6px 16px; background:var(--red); color:white; border:none; border-radius:20px; font-size:13px; font-weight:500; cursor:pointer; }
.poke-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; margin-bottom:0.75rem; }
.poke-card { border-radius:var(--radius-lg); border:0.5px solid var(--border); background:var(--surface); display:flex; flex-direction:column; position:relative; overflow:hidden; }
.poke-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--ac,var(--border2)); z-index:1; }
.poke-card.empty { background:var(--surface2); cursor:pointer; }
.poke-card.empty::before { background:var(--border2); }
.type-strip { height:3px; width:100%; flex-shrink:0; }
.card-main { padding:9px 9px 7px 14px; display:flex; flex-direction:column; gap:3px; }
.slot-num { position:absolute; top:5px; right:7px; font-size:10px; color:var(--text2); font-weight:500; }
.poke-name-card { font-size:12px; font-weight:500; color:var(--text); line-height:1.2; word-break:break-all; }
.form-badge { font-size:9px; color:var(--text2); }
.type-badges { display:flex; gap:3px; flex-wrap:wrap; }
.tbadge { font-size:9px; font-weight:500; color:white; padding:1px 5px; border-radius:6px; }
.card-stats { display:flex; gap:0; margin-top:3px; width:100%; }
.cs-cell { flex:1; display:flex; flex-direction:column; align-items:center; gap:1px; }
.cs-label { font-size:8px; color:var(--text2); font-weight:500; }
.cs-val { font-size:10px; font-weight:500; }
.cs-val.hi,.cs-val.mid,.cs-val.lo { color:var(--text); }
.card-memo-static { padding:5px 9px 5px 14px; border-top:0.5px solid var(--border); }
.memo-row { display:flex; gap:5px; align-items:baseline; padding:2px 0; }
.memo-row-label { font-size:9px; font-weight:500; color:var(--text2); white-space:nowrap; flex-shrink:0; min-width:36px; }
.memo-tags-inline { display:flex; flex-wrap:wrap; gap:3px; flex:1; min-width:0; }
.memo-tag-pill { font-size:10px; color:var(--text); background:var(--surface2); border:0.5px solid var(--border); border-radius:8px; padding:1px 6px; white-space:nowrap; }
.accordion-trigger { display:flex; align-items:center; justify-content:space-between; padding:5px 9px 5px 14px; border-top:0.5px solid var(--border); cursor:pointer; background:transparent; border-left:none; border-right:none; border-bottom:none; width:100%; text-align:left; }
.accordion-trigger-label { font-size:10px; font-weight:500; color:var(--text2); }
.accordion-arrow { font-size:10px; color:var(--text2); transition:transform 0.2s; flex-shrink:0; }
.accordion-arrow.open { transform:rotate(180deg); }
.accordion-body { max-height:0; overflow:hidden; transition:max-height 0.25s ease; }
.accordion-body.open { max-height:200px; }
.accordion-inner { padding:5px 9px 7px 14px; font-size:11px; color:var(--text); line-height:1.5; white-space:pre-wrap; word-break:break-all; }
.slot-btns { display:flex; gap:4px; padding:5px 8px 8px 14px; width:100%; }
.slot-btn { flex:1; padding:5px 3px; border:0.5px solid var(--border); background:var(--surface2); border-radius:var(--radius); font-size:11px; color:var(--text2); cursor:pointer; }
.slot-btn.del { color:var(--red); border-color:rgba(204,34,0,0.25); }
.slot-btn.memo-on { color:var(--ac,var(--text2)); border-color:var(--ac,var(--border)); background:var(--surface); }
.empty-body { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; padding:1.5rem 8px; }
.empty-plus { width:30px; height:30px; border-radius:50%; border:1.5px dashed var(--border2); display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text2); }
.empty-label { font-size:11px; color:var(--text2); }
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; display:flex; align-items:flex-end; }
.sheet { background:var(--surface); border-radius:20px 20px 0 0; width:100%; max-width:430px; margin:0 auto; max-height:92vh; display:flex; flex-direction:column; }
.handle { width:36px; height:4px; background:var(--border2); border-radius:2px; margin:10px auto 0; flex-shrink:0; }
.sheet-head { padding:10px 1rem; border-bottom:0.5px solid var(--border); flex-shrink:0; }
.sheet-title { font-size:15px; font-weight:500; margin-bottom:8px; color:var(--text); }
.search-box { width:100%; padding:8px 12px; border:0.5px solid var(--border); border-radius:var(--radius); font-size:14px; background:var(--surface2); color:var(--text); outline:none; }
.search-box:focus { border-color:var(--red); }
.results { overflow-y:auto; flex:1; display:flex; flex-direction:column; justify-content:flex-start; }
.result-item { display:flex; align-items:center; gap:10px; padding:9px 1rem 9px 1.25rem; border-bottom:0.5px solid var(--border); cursor:pointer; position:relative; }
.result-item::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--rac,var(--border)); }
.result-item:active { background:var(--surface2); }
.result-info { flex:1; min-width:0; }
.result-name { font-size:14px; font-weight:500; color:var(--text); }
.result-form { font-size:11px; color:var(--text2); }
.result-types { display:flex; gap:3px; margin-top:2px; }
.result-no { font-size:12px; color:var(--text2); flex-shrink:0; }
.loading-msg { text-align:center; padding:2rem; font-size:13px; color:var(--text2); }
.memo-head { padding:12px 1rem 10px 1.25rem; border-bottom:0.5px solid var(--border); flex-shrink:0; position:relative; overflow:hidden; }
.memo-head::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--mac,var(--border)); }
.memo-pname { font-size:17px; font-weight:500; color:var(--text); }
.memo-psub { font-size:12px; color:var(--text2); margin-top:2px; }
.memo-psub-badges { display:flex; gap:4px; margin-top:5px; flex-wrap:wrap; }
.stats-row { display:flex; gap:0; margin-top:10px; border:0.5px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.stat-cell { flex:1; display:flex; flex-direction:column; align-items:center; padding:5px 2px; border-right:0.5px solid var(--border); }
.stat-cell:last-child { border-right:none; }
.stat-cell-label { font-size:9px; font-weight:500; color:var(--text2); margin-bottom:3px; }
.stat-cell-val { font-size:13px; font-weight:500; }
.stat-cell-val.hi,.stat-cell-val.mid,.stat-cell-val.lo { color:var(--text); }
.stats-bst { font-size:11px; color:var(--text2); margin-top:5px; text-align:right; }
.stats-bst span { font-weight:500; color:var(--text); }
.no-stat { font-size:11px; color:var(--text2); margin-top:8px; }
.memo-body { padding:0.75rem 1rem; flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:0.75rem; }
.memo-label { font-size:11px; font-weight:500; color:var(--text2); letter-spacing:0.06em; text-transform:uppercase; display:block; margin-bottom:6px; }
.tag-input-wrap { border:0.5px solid var(--border); border-radius:var(--radius); background:var(--surface2); padding:6px 8px; display:flex; flex-wrap:wrap; gap:5px; cursor:text; }
.tag-input-wrap:focus-within { border-color:var(--red); }
.tag-chip { display:flex; align-items:center; gap:3px; background:var(--surface); border:0.5px solid var(--border2); border-radius:8px; padding:2px 6px 2px 8px; font-size:12px; color:var(--text); white-space:nowrap; }
.tag-chip-del { background:none; border:none; cursor:pointer; color:var(--text2); font-size:13px; line-height:1; padding:0 1px; }
.tag-chip-del:hover { color:var(--red); }
.tag-text-input { border:none; background:transparent; outline:none; font-size:13px; color:var(--text); min-width:80px; flex:1; }
.tag-hint { font-size:11px; color:var(--text2); margin-top:3px; }
.memo-ta { width:100%; border:0.5px solid var(--border); border-radius:var(--radius); padding:8px 10px; font-size:14px; background:var(--surface2); color:var(--text); resize:none; outline:none; line-height:1.6; }
.memo-ta:focus { border-color:var(--red); }
.memo-save { margin:0 1rem 1rem; padding:13px; background:var(--red); color:white; border:none; border-radius:var(--radius-lg); font-size:15px; font-weight:500; cursor:pointer; flex-shrink:0; }
.hist-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:10px 12px; margin-bottom:8px; cursor:pointer; position:relative; overflow:hidden; }
.hist-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--red); }
.hist-inner { padding-left:8px; }
.hist-top { display:flex; align-items:center; margin-bottom:8px; }
.hist-num { font-size:14px; font-weight:500; color:var(--text); }
.hist-date { font-size:12px; color:var(--text2); margin-left:auto; }
.hist-chips { display:flex; gap:4px; flex-wrap:wrap; }
.hist-chip { display:flex; align-items:center; padding:3px 8px; border-radius:20px; border:0.5px solid var(--border); background:var(--surface2); position:relative; overflow:hidden; }
.hist-chip::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--hac,var(--border)); }
.hist-chip-name { font-size:11px; padding-left:2px; color:var(--text); }
.memo-list-item { display:flex; align-items:flex-start; padding:9px 0; border-bottom:0.5px solid var(--border); cursor:pointer; position:relative; }
.memo-list-item::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--mlac,var(--border)); }
.memo-list-inner { flex:1; min-width:0; padding-left:8px; }
.memo-item-name { font-size:14px; font-weight:500; color:var(--text); }
.empty-state { text-align:center; padding:3rem 1rem; font-size:14px; color:var(--text2); line-height:1.8; }
.mega-label{font-size:10px;font-weight:500;color:var(--text2);margin-top:8px;margin-bottom:3px;}
.cs-mega-label{font-size:8px;font-weight:500;color:var(--text2);margin-top:3px;width:100%;}

/* Safe Area対応（ノッチ・ホームインジケーター） */
body {
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}
/* ブラウザ（PWA以外）でのアクセス時は余白なし */
@media not all and (display-mode: standalone) {
  body { padding: 0; }
}

<body>
<div id="app">
  <div class="header">
    <div class="header-label">ポケマネ</div>
    <div class="header-title">ポケモンバトルマネージャー</div>
    <div class="tabs">
      <button class="tab on" onclick="switchTab('battle',this)">バトル</button>
      <button class="tab" onclick="switchTab('history',this)">履歴</button>
      <button class="tab" onclick="switchTab('memolist',this)">メモ帳</button>
    </div>
  </div>
  <div id="view-battle" class="view on">
    <div class="battle-meta">
      <div><div class="battle-num" id="bnum">#1</div><div class="battle-date" id="bdate"></div></div>
      <button class="btn-new" onclick="newBattle()">+ 新規バトル</button>
    </div>
    <div class="section-label">相手のパーティ（最大6匹）</div>
    <div class="poke-grid" id="poke-grid"></div>
  </div>
  <div id="view-history" class="view">
    <div class="section-label" style="margin-bottom:0.75rem">バトル履歴</div>
    <div id="hist-list"></div>
  </div>
  <div id="view-memolist" class="view">
    <div class="section-label" style="margin-bottom:0.5rem">メモ帳</div>
    <input class="search-box" style="margin-bottom:0.75rem" placeholder="ポケモン名で検索..." oninput="renderMemoList(this.value)" />
    <div id="memo-list-body"></div>
  </div>
</div>

<div id="search-overlay" class="overlay" style="display:none" onclick="if(event.target===this)closeSearch()">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-head">
      <div class="sheet-title">ポケモンを選択</div>
      <input class="search-box" id="sq" placeholder="名前（ひらがな可）またはNo.で検索..." oninput="filterPoke(this.value)" />
    </div>
    <div class="results" id="results-body"><div class="loading-msg">名前またはNo.で検索...</div></div>
  </div>
</div>

<div id="memo-overlay" class="overlay" style="display:none" onclick="if(event.target===this)closeMemo()">
  <div class="sheet">
    <div class="handle"></div>
    <div class="memo-head" id="memo-head"></div>
    <div class="memo-body">
      <div>
        <label class="memo-label">よくある技</label>
        <div class="tag-input-wrap" id="moves-wrap" onclick="focusTagInput('moves-input')">
          <input class="tag-text-input" id="moves-input" placeholder="技名を入力してEnter/スペース" onkeydown="handleTagKey(event,'moves')" oninput="handleTagInput(event,'moves')" />
        </div>
        <div class="tag-hint">Enterまたは「、」スペースで追加</div>
      </div>
      <div>
        <label class="memo-label">よくある持ち物</label>
        <div class="tag-input-wrap" id="items-wrap" onclick="focusTagInput('items-input')">
          <input class="tag-text-input" id="items-input" placeholder="持ち物を入力してEnter/スペース" onkeydown="handleTagKey(event,'items')" oninput="handleTagInput(event,'items')" />
        </div>
        <div class="tag-hint">Enterまたは「、」スペースで追加</div>
      </div>
      <div>
        <label class="memo-label">対策・メモ</label>
        <textarea class="memo-ta" id="m-note" rows="4" placeholder="例: ルナアーラのメテオビームで確1"></textarea>
      </div>
    </div>
    <button class="memo-save" onclick="saveMemo()">保存する</button>
  </div>
</div>

function toKatakana(s){return s.replace(/[\u3041-\u3096]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60));}
function normalizeQ(s){return toKatakana(s.toLowerCase());}
function sc(v){return v>=100?'hi':v>=70?'mid':'lo';}
function tc(t){return TC[t]||'#999';}
function tj(t){return TJ[t]||t;}
function badgeHtml(types){return (types||[]).map(t=>`<span class="tbadge" style="background:${tc(t)}">${tj(t)}</span>`).join('');}
function stripHtml(types){if(!types||types.length<2)return '';return `<div class="type-strip" style="background:linear-gradient(90deg,${tc(types[0])} 50%,${tc(types[1])} 50%)"></div>`;}
function hasMemo(key){const m=state.memos[key];return !!(m&&(m.moves?.length||m.items?.length||m.note));}
function escHtml(s){return(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function getBSKey(pk){return pk.bsKey||pk.key;}

function getBS(pk){
  const k=getBSKey(pk);
  return BS[k]||BS[parseInt(k)]||null;
}

function inlineStatsHtml(pk){
  const s=getBS(pk);if(!s)return '';
  let h=`<div class="card-stats">${SL.map((l,i)=>`<div class="cs-cell"><span class="cs-label">${l}</span><span class="cs-val ${sc(s[i])}">${s[i]}</span></div>`).join('')}</div>`;
  for(const mega of (MEGA_MAP[pk.id]||[])){
    const ms=BS[mega.key];if(!ms)continue;
    h+=`<div class="cs-mega-label">${mega.name}</div><div class="card-stats">${SL.map((l,i)=>`<div class="cs-cell"><span class="cs-label">${l}</span><span class="cs-val ${sc(ms[i])}">${ms[i]}</span></div>`).join('')}</div>`;
  }
  return h;
}
function modalStatsHtml(pk){
  const s=getBS(pk);if(!s)return '<div class="no-stat">種族値データなし</div>';
  const bst=s.reduce((a,b)=>a+b,0);
  let h=`<div class="stats-row">${SL.map((l,i)=>`<div class="stat-cell"><span class="stat-cell-label">${l}</span><span class="stat-cell-val ${sc(s[i])}">${s[i]}</span></div>`).join('')}</div><div class="stats-bst">合計 <span>${bst}</span></div>`;
  for(const mega of (MEGA_MAP[pk.id]||[])){
    const ms=BS[mega.key];if(!ms)continue;
    const mbst=ms.reduce((a,b)=>a+b,0);
    h+=`<div class="mega-label">${mega.name}</div><div class="stats-row">${SL.map((l,i)=>`<div class="stat-cell"><span class="stat-cell-label">${l}</span><span class="stat-cell-val ${sc(ms[i])}">${ms[i]}</span></div>`).join('')}</div><div class="stats-bst">合計 <span>${mbst}</span></div>`;
  }
  return h;
}

const ALL_POKE=[
  ...Object.entries(PDATA).map(([id,[name,...types]])=>({
    id:+id, key:String(id), name, types, form:null,
    searchKeys:[normalizeQ(name)]
  })),
  ...FORMS.map(f=>({
    id:null, key:f.key, name:f.name, types:f.types, form:f.form,
    bsKey:f.key,
    searchKeys:[normalizeQ(f.name),normalizeQ(f.search||''),...(f.form?[normalizeQ(f.form)]:[]) ]
  }))
].sort((a,b)=>{if(a.id&&b.id)return a.id-b.id;if(a.id)return -1;if(b.id)return 1;return 0;});

const state={
  searchHistory:[],
  battles:[{id:1,date:new Date().toLocaleDateString('ja-JP'),slots:Array(6).fill(null)}],
  cur:0, memos:{}, editSlot:null, editPokeKey:null,
  openAcc:new Set(), moveTags:[], itemTags:[],
};
// ===== localStorageへの永続化 =====
const STORAGE_KEY = 'pokeman_state_v3';

function saveState(){
  try{
    const s = {
      battles: state.battles.map(b=>{
        return {...b, slots: b.slots.map(pk=>pk?{key:pk.key}:null)};
      }),
      cur: state.cur,
      memos: state.memos,
      searchHistory: state.searchHistory,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
  }catch(e){}
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const s = JSON.parse(raw);
    // battlesを復元（slotのkeyからALL_POKEを再解決）
    if(s.battles?.length){
      state.battles = s.battles.map(b=>{
        return {
          ...b,
          slots: (b.slots||[]).map(slot=>
            slot?.key ? ALL_POKE.find(p=>p.key===slot.key)||null : null
          )
        };
      });
      state.cur = Math.min(s.cur||0, state.battles.length-1);
    }
    if(s.memos) state.memos = s.memos;
    if(s.searchHistory) state.searchHistory = s.searchHistory;
  }catch(e){
    console.warn('loadState error:', e);
  }
}

// 起動時にロード
loadState();

function focusTagInput(id){document.getElementById(id)?.focus();}
function renderTagWrap(wrapId,tags,field){
  const wrap=document.getElementById(wrapId);if(!wrap)return;
  const inputId=field==='moves'?'moves-input':'items-input';
  wrap.innerHTML=tags.map((t,i)=>`<span class="tag-chip">${escHtml(t)}<button class="tag-chip-del" onclick="removeTag('${field}',${i})">×</button></span>`).join('')+`<input class="tag-text-input" id="${inputId}" placeholder="${field==='moves'?'技名を入力':'持ち物を入力'}" onkeydown="handleTagKey(event,'${field}')" oninput="handleTagInput(event,'${field}')" />`;
}
function handleTagKey(e,field){
  if(e.key==='Enter'){e.preventDefault();addTagFromInput(field);}
  if(e.key==='Backspace'&&e.target.value===''){const arr=field==='moves'?state.moveTags:state.itemTags;if(arr.length){arr.pop();renderTagWrap(field==='moves'?'moves-wrap':'items-wrap',arr,field);}}
}
function handleTagInput(e,field){if(e.target.value.includes('、')||e.target.value.endsWith(' ')||e.target.value.endsWith('　'))addTagFromInput(field);}
function addTagFromInput(field){
  const inputId=field==='moves'?'moves-input':'items-input';
  const el=document.getElementById(inputId);if(!el)return;
  const val=el.value.replace(/[、 　]/g,'').trim();if(!val)return;
  if(field==='moves')state.moveTags.push(val);else state.itemTags.push(val);
  el.value='';renderTagWrap(field==='moves'?'moves-wrap':'items-wrap',field==='moves'?state.moveTags:state.itemTags,field);
  document.getElementById(inputId)?.focus();
}
function removeTag(field,i){
  if(field==='moves')state.moveTags.splice(i,1);else state.itemTags.splice(i,1);
  renderTagWrap(field==='moves'?'moves-wrap':'items-wrap',field==='moves'?state.moveTags:state.itemTags,field);
  document.getElementById(field==='moves'?'moves-input':'items-input')?.focus();
}

function renderSearchHistory(){
  const el=document.getElementById('results-body');
  if(!state.searchHistory.length){
    el.innerHTML='<div class="loading-msg">名前またはNo.で検索...</div>';
    return;
  }
  const histPokes=state.searchHistory.map(k=>ALL_POKE.find(p=>p.key===k)).filter(Boolean);
  el.innerHTML='<div style="padding:6px 1rem 4px;font-size:11px;font-weight:500;color:var(--text2);letter-spacing:0.05em">最近選んだポケモン</div>'+
    histPokes.map(p=>`
    <div class="result-item" style="--rac:${tc(p.types[0])}" onclick="selectPoke('${p.key}')">
      <div class="result-info">
        <div class="result-name">${p.name}</div>
        ${p.form?`<div class="result-form">${p.form}</div>`:''}
        <div class="result-types">${badgeHtml(p.types)}</div>
      </div>
      ${p.id?`<span class="result-no">#${String(p.id).padStart(4,'0')}</span>`:''}
    </div>`).join('');
}
function filterPoke(q){
  q=q.trim();
  if(!q){renderSearchHistory();return;}
  const nq=normalizeQ(q);
  const seen=new Set();
  const list=ALL_POKE.filter(p=>{
    if(!(String(p.id).includes(q)||p.searchKeys.some(k=>k.includes(nq))))return false;
    const dk=p.name+'|'+(p.form||'');
    if(seen.has(dk))return false;
    seen.add(dk);return true;
  }).slice(0,80);
  renderResults(list);
}
function renderResults(list){
  const el=document.getElementById('results-body');
  if(!list.length){el.innerHTML='<div class="loading-msg">見つかりませんでした</div>';return;}
  el.innerHTML=list.map(p=>`
    <div class="result-item" style="--rac:${tc(p.types[0])}" onclick="selectPoke('${p.key}')">
      <div class="result-info">
        <div class="result-name">${p.name}</div>
        ${p.form?`<div class="result-form">${p.form}</div>`:''}
        <div class="result-types">${badgeHtml(p.types)}</div>
      </div>
      ${p.id?`<span class="result-no">#${String(p.id).padStart(4,'0')}</span>`:''}
    </div>`).join('');
}

function switchTab(v,btn){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.getElementById('view-'+v).classList.add('on');btn.classList.add('on');
  if(v==='history')renderHistory();if(v==='memolist')renderMemoList('');
}

function renderBattle(){
  const b=state.battles[state.cur];
  document.getElementById('bnum').textContent='#'+b.id;
  document.getElementById('bdate').textContent=b.date;
  const grid=document.getElementById('poke-grid');grid.innerHTML='';
  for(let i=0;i<6;i++){
    const pk=b.slots[i];const d=document.createElement('div');
    if(pk){
      const m=state.memos[pk.key]||{};const hm=hasMemo(pk.key);
      const acKey=`${state.cur}-${i}`;const acOpen=state.openAcc.has(acKey);
      let staticSec='';
      if(hm&&(m.moves?.length||m.items?.length)){
        staticSec='<div class="card-memo-static">';
        if(m.moves?.length)staticSec+=`<div class="memo-row"><span class="memo-row-label">技</span><div class="memo-tags-inline">${m.moves.map(t=>`<span class="memo-tag-pill">${escHtml(t)}</span>`).join('')}</div></div>`;
        if(m.items?.length)staticSec+=`<div class="memo-row"><span class="memo-row-label">よく使う持ち物</span><div class="memo-tags-inline">${m.items.map(t=>`<span class="memo-tag-pill">${escHtml(t)}</span>`).join('')}</div></div>`;
        staticSec+='</div>';
      }
      let accSec='';
      if(hm&&m.note)accSec=`<div><button class="accordion-trigger" onclick="toggleAcc('${acKey}',event)"><span class="accordion-trigger-label">対策メモ</span><span class="accordion-arrow ${acOpen?'open':''}">▾</span></button><div class="accordion-body ${acOpen?'open':''}"><div class="accordion-inner">${escHtml(m.note)}</div></div></div>`;
      d.className='poke-card';d.setAttribute('style',`--ac:${tc(pk.types[0])}`);
      d.innerHTML=`${stripHtml(pk.types)}<div class="card-main"><span class="slot-num">${i+1}</span><div class="poke-name-card">${pk.name}</div>${pk.form?`<div class="form-badge">${pk.form}</div>`:''}<div class="type-badges">${badgeHtml(pk.types)}</div>${inlineStatsHtml(pk)}</div>${staticSec}${accSec}<div class="slot-btns"><button class="slot-btn ${hm?'memo-on':''}" onclick="openMemoModal('${pk.key}',event)">${hm?'✎ メモ':'メモ'}</button><button class="slot-btn del" onclick="clearSlot(${i},event)">×</button></div>`;
    }else{
      d.className='poke-card empty';
      d.innerHTML=`<span class="slot-num">${i+1}</span><div class="empty-body"><div class="empty-plus">+</div><span class="empty-label">選択</span></div>`;
      d.onclick=()=>openSearch(i);
    }
    grid.appendChild(d);
  }
}

window.toggleAcc=function(key,e){e&&e.stopPropagation();if(state.openAcc.has(key))state.openAcc.delete(key);else state.openAcc.add(key);renderBattle();};
function openSearch(idx){state.editSlot=idx;document.getElementById('sq').value='';document.getElementById('search-overlay').style.display='flex';renderSearchHistory();setTimeout(()=>document.getElementById('sq').focus(),100);}
function closeSearch(){document.getElementById('search-overlay').style.display='none';}
function selectPoke(key){
  const pk=ALL_POKE.find(p=>p.key===key);
  state.battles[state.cur].slots[state.editSlot]=pk;
  // 検索履歴に追加（重複除去・最大10件）
  state.searchHistory=state.searchHistory.filter(k=>k!==key);
  state.searchHistory.unshift(key);
  if(state.searchHistory.length>10) state.searchHistory.pop();
  // メモ未設定ならデフォルト値を自動セット → ファーストビューから表示
  if(!state.memos[key] || (!state.memos[key].moves?.length && !state.memos[key].items?.length && !state.memos[key].note)){
    const dm = DEFAULT_MOVES[pk.key] || DEFAULT_MOVES[String(parseInt(pk.key))] || [];
    const di = DEFAULT_ITEMS[pk.key] || DEFAULT_ITEMS[String(parseInt(pk.key))] || [];
    if(dm.length || di.length){
      state.memos[key] = {moves:[...dm], items:[...di], note:''};
    }
  }
  saveState();closeSearch();renderBattle();
}
function clearSlot(i,e){e.stopPropagation();state.openAcc.delete(`${state.cur}-${i}`);state.battles[state.cur].slots[i]=null;renderBattle();saveState();}

function openMemoModal(key,e){
  e&&e.stopPropagation();
  const pk=ALL_POKE.find(p=>p.key===key)||{key,name:'?',types:['normal'],form:null};
  state.editPokeKey=key;const m=state.memos[key]||{};
  const defaultMoves = DEFAULT_MOVES[pk.key] || DEFAULT_MOVES[String(parseInt(pk.key))] || [];
  const defaultItems = DEFAULT_ITEMS[pk.key] || DEFAULT_ITEMS[String(parseInt(pk.key))] || [];
  state.moveTags = m.moves?.length ? [...m.moves] : [...defaultMoves];
  state.itemTags = m.items?.length ? [...m.items] : [...defaultItems];
  const head=document.getElementById('memo-head');
  head.style.cssText=`--mac:${tc(pk.types[0])}`;
  head.innerHTML=`<div class="memo-pname">${pk.name}</div><div class="memo-psub">${pk.id?`#${String(pk.id).padStart(4,'0')} &nbsp;`:''}${pk.types.map(tj).join(' / ')}${pk.form?` · ${pk.form}`:''}</div><div class="memo-psub-badges">${badgeHtml(pk.types)}</div>${modalStatsHtml(pk)}`;
  renderTagWrap('moves-wrap',state.moveTags,'moves');
  renderTagWrap('items-wrap',state.itemTags,'items');
  document.getElementById('m-note').value=m.note||'';
  document.getElementById('memo-overlay').style.display='flex';
}
function closeMemo(){document.getElementById('memo-overlay').style.display='none';}
function saveMemo(){
  ['moves','items'].forEach(field=>{
    const el=document.getElementById(field==='moves'?'moves-input':'items-input');
    if(el&&el.value.trim()){const val=el.value.replace(/、/g,'').trim();if(val){if(field==='moves')state.moveTags.push(val);else state.itemTags.push(val);}el.value='';}
  });
  state.memos[state.editPokeKey]={moves:[...state.moveTags],items:[...state.itemTags],note:document.getElementById('m-note').value};
  saveState();closeMemo();renderBattle();renderMemoList('');
}
function newBattle(){const id=state.battles.length+1;state.battles.push({id,date:new Date().toLocaleDateString('ja-JP'),slots:Array(6).fill(null)});state.cur=state.battles.length-1;renderBattle();saveState();}
function renderHistory(){
  const el=document.getElementById('hist-list');
  el.innerHTML=[...state.battles].reverse().map((b,ri)=>{
    const idx=state.battles.length-1-ri;const filled=b.slots.filter(Boolean);
    const chips=filled.map(pk=>`<div class="hist-chip" style="--hac:${tc(pk.types[0])}"><span class="hist-chip-name">${pk.name}</span></div>`).join('');
    return `<div class="hist-card" onclick="jumpBattle(${idx})"><div class="hist-inner"><div class="hist-top"><span class="hist-num">バトル #${b.id}</span><span class="hist-date">${b.date}</span></div><div class="hist-chips">${chips||'<span style="font-size:12px;color:var(--text2)">未設定</span>'}</div></div></div>`;
  }).join('');
}
function jumpBattle(idx){state.cur=idx;document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));document.getElementById('view-battle').classList.add('on');document.querySelector('.tab').classList.add('on');renderBattle();}
function renderMemoList(q){
  q=(q||'').toLowerCase();const nq=normalizeQ(q);
  const items=Object.entries(state.memos).filter(([,m])=>m&&(m.moves?.length||m.items?.length||m.note)).map(([key])=>ALL_POKE.find(p=>p.key===key)).filter(Boolean).filter(p=>!q||p.searchKeys.some(k=>k.includes(nq)));
  const el=document.getElementById('memo-list-body');
  if(!items.length){el.innerHTML='<div class="empty-state">メモがまだありません<br><span style="font-size:12px">バトル画面でポケモンを選択し<br>メモボタンから追加できます</span></div>';return;}
  el.innerHTML=items.map(pk=>{
    const m=state.memos[pk.key];
    return `<div class="memo-list-item" style="--mlac:${tc(pk.types[0])}" onclick="openMemoModal('${pk.key}')">
      <div class="memo-list-inner">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span class="memo-item-name">${pk.name}</span>${badgeHtml(pk.types)}</div>
        ${m.moves?.length?`<div class="memo-row"><span class="memo-row-label">技</span><div class="memo-tags-inline">${m.moves.map(t=>`<span class="memo-tag-pill">${escHtml(t)}</span>`).join('')}</div></div>`:''}
        ${m.items?.length?`<div class="memo-row"><span class="memo-row-label">持ち物</span><div class="memo-tags-inline">${m.items.map(t=>`<span class="memo-tag-pill">${escHtml(t)}</span>`).join('')}</div></div>`:''}
        ${m.note?`<div class="memo-row"><span class="memo-row-label">メモ</span><span style="flex:1;min-width:0;font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(m.note)}</span></div>`:''}
      </div>
    </div>`;
  }).join('');
}
renderBattle();
</script>
